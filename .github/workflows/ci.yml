name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check sovereignguard/ tests/

      - name: Run type checker (mypy)
        run: |
          pip install mypy
          mypy sovereignguard/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run tests with coverage
        env:
          TARGET_API_KEY: test-key-ci
        run: |
          pytest tests/ -v --tb=short --cov=sovereignguard --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sovereignguard:latest .

      - name: Verify Docker image starts
        run: |
          docker run -d --name sg-test \
            -e TARGET_API_KEY=test-key \
            -e BYPASS_MASKING=true \
            -p 8000:8000 \
            sovereignguard:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop sg-test
